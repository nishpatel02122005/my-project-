{% extends 'base.html' %}

{% block title %}Login to your Account{% endblock %}

{% block content %}
<div class="flex items-center justify-center pt-10">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-10 glass border border-slate-100">
        <h2 class="text-3xl font-bold text-center text-slate-800 mb-8 font-inter">Welcome Back 👋</h2>
        
        <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Username or Phone</label>
                <input type="text" name="username" required 
                       class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition transition-shadow text-slate-700 bg-slate-50 focus:bg-white"
                       placeholder="Enter your username">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
                <input type="password" name="password" required 
                       class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition transition-shadow text-slate-700 bg-slate-50 focus:bg-white"
                       placeholder="Enter your password">
            </div>
            
            <button type="submit" class="w-full bg-primary text-white py-3 rounded-xl font-bold hover:bg-indigo-700 hover:shadow-lg hover:shadow-primary/30 active:scale-95 transition-all text-lg">
                Sign In
            </button>
        </form>
        
        <p class="mt-8 text-center text-sm text-slate-500">
            Don't have an account? 
            <a href="{{ url_for('register') }}" class="font-bold text-primary hover:text-indigo-800 transition">Create new account</a>
        </p>
    </div>
</div>
{% endblock %}
