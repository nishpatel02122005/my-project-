{% extends 'base.html' %}

{% block title %}Create a New Account{% endblock %}

{% block content %}
<div class="flex items-center justify-center pt-10">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-10 glass border border-slate-100">
        <h2 class="text-3xl font-bold text-center text-slate-800 mb-8 font-inter">Sign Up 🚀</h2>
        
        <form method="POST" action="{{ url_for('register') }}" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Username or Phone</label>
                <input type="text" name="username" required 
                       class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition transition-shadow text-slate-700 bg-slate-50 focus:bg-white"
                       placeholder="E.g. 9876543210 or yourname">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
                <input type="password" name="password" required 
                       class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition transition-shadow text-slate-700 bg-slate-50 focus:bg-white"
                       placeholder="Choose a strong password">
            </div>
            
            <button type="submit" class="w-full bg-secondary text-white py-3 rounded-xl font-bold hover:bg-emerald-600 hover:shadow-lg hover:shadow-secondary/30 active:scale-95 transition-all text-lg">
                Create Account
            </button>
        </form>
        
        <p class="mt-8 text-center text-sm text-slate-500">
            Already have an account? 
            <a href="{{ url_for('login') }}" class="font-bold text-secondary hover:text-emerald-800 transition">Log in instead</a>
        </p>
    </div>
</div>
{% endblock %}
